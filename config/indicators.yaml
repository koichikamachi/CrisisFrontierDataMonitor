# 2. 国別参考指標（フェーズ4以降）
# =============================================================
#
# 本フェーズでは空のまま維持する。
# サンプルデータの投入や補完提案は不要。
#
# 将来の追加例（タイの場合）：
#   th:
#     - id: th_short_term_debt
#       label: 短期対外債務
#       ...
#     - id: th_credit_gdp_gap
#       label: 信用GDP乖離率
#       ...

indicators_country_specific: {}


# =============================================================
# 3. データソース割当
# =============================================================
#
# 国 × 指標ごとに、どこから取得するかを定義する。
# frequency は「日次」「週次」「月次」「四半期」「年次」のいずれか。
# 指標カードのメタ行に表示し、粒度の違いによる誤読を防ぐ。

data_sources:

  - country_id: jp
    indicator_id: fx_usd
    source: fred
    series_id: DEXJPUS
    frequency: 日次

  - country_id: jp
