# Crisis Frontier Global Data Monitor
# 指標定義・データソース定義
#
# 三層構造：
#   1. indicators_global         … 全国共通のコア指標定義（観測マニュアル）
#   2. indicators_country_specific … 国別参考指標（フェーズ4以降、現在は空）
#   3. data_sources               … 国×指標×データソースの割当
#
# 命名規約：
#   - id は小文字スネーク
#   - URL では fx_usd → /indicator/fx-usd/ のようにハイフン変換
#
# source_note は一次源のみ。再配信経路（FRED, World Bank 等）は
# /data-paths/ ページで一括説明する。
#
# IMF SDMX 系列の series_id は "{dataflow}/{key}" 形式（例: MFS_IR/THA.DISR_RT_PT_A_PT.M）

# =============================================================
# 1. コア指標定義（全国共通）
# =============================================================

indicators_global:

  - id: fx_usd
    label: 為替レート（対米ドル）
    display_order: 1
    description: |
      対米ドル為替レートは、自国通貨が1ドルと交換される価格を示す。
      国際取引、資本移動、金融政策の影響が最も早く現れる指標の一つである。
      通貨の信認や対外資金の流出入の圧力を直接反映する。
    source_note: |
      為替レートは各国の中央銀行または財務省が一次データを公表する。
      日本の場合は日本銀行、米国の場合は連邦準備制度、
      タイの場合はタイ中央銀行（Bank of Thailand）である。
    how_to_read: |
      自国通貨の数値が上昇する場合（例：150円→160円）は通貨安を意味する。
      急激な変動は資本移動や金融不安の兆候となることがある。
      長期的な動きは外貨準備や金利との関係で観察することが重要である。

  - id: policy_rate
    label: 政策金利
    display_order: 2
    description: |
      政策金利は中央銀行が短期金融市場に対して設定する基準金利であり、
      金融政策の基本的な方向（緩和または引き締め）を示す。
      景気、物価、金融安定の状況に応じて調整される。
    source_note: |
      政策金利は各国中央銀行によって公式に決定・公表される。
      米国では連邦準備制度、日本では日本銀行、
      ユーロ圏では欧州中央銀行、
      タイではタイ中央銀行（Bank of Thailand, BOT）が管理する。
    how_to_read: |
      政策金利の上昇は金融引き締め、低下は金融緩和を意味する。
      金利変更そのものよりも、そのタイミングと頻度が重要である。
      政策金利だけでなく、中央銀行のバランスシートや市場金利と
      併せて観察する必要がある。

  - id: bond_10y
    label: 10年国債利回り
    display_order: 3
    description: |
      10年国債利回りは、政府が長期資金を調達する際の代表的な金利であり、
      市場参加者が将来のインフレや財政の安定性をどのように見ているかを反映する。
      長期金利は住宅ローンや企業投資にも影響を与える基準的な価格である。
    source_note: |
      国債利回りは各国の財務省または中央銀行によって公表される。
      米国の場合は財務省、日本の場合は財務省および日本銀行が
      主要な公表主体である。
    how_to_read: |
      長期金利の上昇はインフレ期待や財政リスクの上昇を示すことがある。
      短期金利との差（利回り曲線）も重要な情報であり、
      長期金利が短期金利を下回る状態は景気後退の前兆とされることがある。
    how_to_read_country_specific:
      th: |
        タイの10年国債利回りは、国内10年国債のベンチマークが
        1998-1999年の財政再建過程で再構築された経緯により、
        本データ基盤では1999年9月以降のみを表示する。
        1997年アジア通貨危機期のタイの金融逼迫を観察したい場合は、
        本データ基盤の th/policy_rate
        （タイ中央銀行公定歩合、1990年以降）を併せて参照されたい。

  - id: cpi
    label: 消費者物価指数（CPI）
    display_order: 4
    description: |
      消費者物価指数（CPI）は、家庭が購入する商品やサービスの価格水準の変化を
      測定する指標であり、インフレの最も基本的な尺度として広く利用されている。
      中央銀行の金融政策の判断材料として重要な役割を持つ。
    source_note: |
      CPI は各国の統計局によって定期的に公表される。
      米国では労働統計局（BLS）、日本では総務省統計局、
      タイでは商務省貿易政策戦略局が公表主体である。
    how_to_read: |
      CPI の上昇率が高い場合はインフレ圧力の増加を意味する。
      単月の変動よりも、数か月から1年の傾向を観察することが重要である。
      金利や為替と合わせて見ることで、政策の影響を理解しやすくなる。

      本データ基盤では各国とも「総合CPI（headline）」を採用している。
      日本固有の「コアCPI」（生鮮食品を除く総合）や、
      タイの所得階層別CPI（一般／低所得／非都市部）は将来の
      国別参考指標（indicators_country_specific）として
      別途整備する余地がある。

  - id: fx_reserves
    label: 外貨準備高
    display_order: 5
    description: |
      外貨準備高は、中央銀行が保有する外貨資産の総額を示す。
      通貨の防衛や国際支払いに備えるための資金であり、
      対外危機への耐性を測る基本的な指標である。
    source_note: |
      外貨準備高は各国の中央銀行によって月次または週次で公表される。
      日本では財務省・日本銀行、米国では連邦準備制度、
      タイではタイ中央銀行が公表する。
    how_to_read: |
      外貨準備の減少が続く場合は通貨防衛や資本流出の圧力を示すことがある。
      水準だけでなく、短期対外債務との比率や為替の動きと併せて
      観察することが重要である。
    how_to_read_country_specific:
      us: |
        米国は国際基軸通貨の発行国であるため、外貨準備（金を除く、
        約350〜400億ドル）はGDP比で極めて小さく、ほぼフラットに推移する。
        日本やタイのような対外危機への耐性指標としての意味は限定的であり、
        米国の対外金融ストレスを観察する場合は、FRBのUSDスワップライン残高
        （FRED系列：SWPT）を別途参照することが推奨される。

  - id: central_bank_total_assets
    label: 中央銀行総資産
    display_order: 6
    description: |
      中央銀行総資産は、中央銀行が保有する資産の総額を示す。
      金融市場に供給された資金量を直接反映し、
      量的緩和（QE）や量的引き締め（QT）の規模を観察するための基本指標である。
    source_note: |
      中央銀行総資産は各国中央銀行が定期的に公表する。
      米国では連邦準備制度、日本では日本銀行、
      ユーロ圏では欧州中央銀行が公表主体である。
    source_note_country_specific:
      us: |
        米国の中央銀行総資産系列（WALCL）は2002年12月以降が利用可能であり、
        それ以前は本データ基盤では表示できない。
        2008年金融危機以降の量的緩和（QE）局面の観察に最も適している。
      jp: |
        日本の中央銀行総資産は IMF SDMX の MFS_CBS データフロー経由
        （系列 S121_A_TA_ASEC_CB1SR）で2001年12月以降を取得する。
        これは IMF の金融統計枠組み
        （Monetary and Financial Statistics, MFS）が2001年を統一起点と
        しているためで、技術的制約ではなく国際統計設計上の事情である。
      th: |
        タイの中央銀行総資産は IMF SDMX の MFS_CBS データフロー経由
        （系列 S121_A_TA_ASEC_CB1SR）で2001年12月以降を取得する。
        これは IMF の金融統計枠組み
        （Monetary and Financial Statistics, MFS）が2001年を統一起点と
        しているためで、技術的制約ではなく国際統計設計上の事情である。
    how_to_read: |
      総資産の増加は金融緩和や危機対応による資金供給を意味する。
      急激な拡大は金融不安や景気後退への対応として現れることが多い。
      政策金利と併せて観察することで、金融政策の方向をより明確に理解できる。

      本データ基盤では、米国は米ドル建て（WALCL）、日本は円建て、
      タイはバーツ建て（いずれも IMF SDMX の S121_A_TA_ASEC_CB1SR）で
      記録している。これは各国一次源の単位を保つ方針による。
      国際比較する場合は、為替換算では為替変動の影響を受けるため、
      GDP比に直してから比較するのが標準的である。


